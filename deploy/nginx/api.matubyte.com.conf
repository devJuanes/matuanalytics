# MatuAnalytics API — api.matubyte.com
# Copiar a: /etc/nginx/sites-available/api.matubyte.com
# ln -s /etc/nginx/sites-available/api.matubyte.com /etc/nginx/sites-enabled/

upstream matuanalytics_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.matubyte.com;

    # Certbot: certbot --nginx -d api.matubyte.com
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://matuanalytics_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Socket.IO (tiempo real)
    location /socket.io/ {
        proxy_pass http://matuanalytics_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Tracker público (sitios de clientes)
    location = /tracker.js {
        proxy_pass http://matuanalytics_api;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /health {
        proxy_pass http://matuanalytics_api;
        access_log off;
    }
}

